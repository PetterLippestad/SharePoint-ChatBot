<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SharePoint AI Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #161b27;
    --surface2: #1e2537;
    --border: #2a3347;
    --accent: #3b82f6;
    --accent-glow: rgba(59,130,246,0.18);
    --accent2: #6366f1;
    --text: #e8edf5;
    --text-muted: #7a8aa0;
    --text-dim: #3d4f6b;
    --user-bubble: #1d3a6b;
    --user-border: #2a4f8a;
    --bot-bubble: #1a2133;
    --bot-border: #2a3347;
    --success: #22c55e;
    --radius: 14px;
    --radius-sm: 8px;
  }

  html, body {
    height: 100%;
    width: 100%;
    overflow: hidden;
    background: var(--bg);
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    font-size: 14px;
  }

  .app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    max-height: 100vh;
    background: var(--bg);
    position: relative;
    overflow: hidden;
  }

  /* Grid background */
  .app::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(59,130,246,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(59,130,246,0.03) 1px, transparent 1px);
    background-size: 32px 32px;
    pointer-events: none;
    z-index: 0;
  }

  /* Header */
  .header {
    position: relative;
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(10px);
  }

  .header-icon {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 0 16px var(--accent-glow);
  }

  .header-icon svg { width: 18px; height: 18px; fill: white; }

  .header-info { flex: 1; }
  .header-title { font-size: 14px; font-weight: 600; color: var(--text); letter-spacing: -0.01em; }
  .header-sub { font-size: 11px; color: var(--text-muted); margin-top: 1px; }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--success);
    box-shadow: 0 0 6px var(--success);
    animation: pulse 2s infinite;
    flex-shrink: 0;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* Chat area */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    position: relative;
    z-index: 1;
    scroll-behavior: smooth;
  }

  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* Message rows */
  .msg-row {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    animation: fadeUp 0.3s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg-row.user { flex-direction: row-reverse; }

  .avatar {
    width: 30px; height: 30px;
    border-radius: 9px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 600;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .avatar.bot {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
    box-shadow: 0 0 10px var(--accent-glow);
  }

  .avatar.user {
    background: var(--user-bubble);
    border: 1px solid var(--user-border);
    color: #93c5fd;
  }

  .bubble {
    max-width: calc(100% - 80px);
    padding: 11px 14px;
    border-radius: var(--radius);
    line-height: 1.6;
    font-size: 13.5px;
    word-break: break-word;
    white-space: pre-wrap;
  }

  .bubble.bot {
    background: var(--bot-bubble);
    border: 1px solid var(--bot-border);
    color: var(--text);
    border-top-left-radius: 4px;
  }

  .bubble.user {
    background: var(--user-bubble);
    border: 1px solid var(--user-border);
    color: #dbeafe;
    border-top-right-radius: 4px;
    text-align: left;
  }

  /* Source chips */
  .sources {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 10px;
  }

  .source-chip {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 3px 9px;
    border-radius: 20px;
    background: rgba(59,130,246,0.1);
    border: 1px solid rgba(59,130,246,0.2);
    font-size: 11px;
    color: #93c5fd;
    font-family: 'DM Mono', monospace;
  }

  .source-chip svg { width: 10px; height: 10px; flex-shrink: 0; }

  /* Thinking indicator */
  .thinking {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 10px 14px;
    background: var(--bot-bubble);
    border: 1px solid var(--bot-border);
    border-radius: var(--radius);
    border-top-left-radius: 4px;
    max-width: 80px;
  }

  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: bounce 1.2s infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
    40% { transform: translateY(-5px); opacity: 1; }
  }

  /* Welcome */
  .welcome {
    text-align: center;
    padding: 30px 20px;
    animation: fadeUp 0.5s ease;
  }

  .welcome-icon {
    width: 56px; height: 56px;
    margin: 0 auto 16px;
    border-radius: 16px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 30px var(--accent-glow);
  }

  .welcome-icon svg { width: 26px; height: 26px; fill: white; }
  .welcome h2 { font-size: 18px; font-weight: 600; margin-bottom: 8px; letter-spacing: -0.02em; }
  .welcome p { font-size: 13px; color: var(--text-muted); line-height: 1.6; max-width: 300px; margin: 0 auto 20px; }

  .suggestions {
    display: flex;
    flex-direction: column;
    gap: 8px;
    align-items: center;
  }

  .suggestion-btn {
    padding: 8px 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--text-muted);
    font-size: 12.5px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    text-align: left;
    width: fit-content;
  }

  .suggestion-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-glow);
  }

  /* Input area */
  .input-area {
    position: relative;
    z-index: 10;
    padding: 12px 16px 16px;
    background: var(--surface);
    border-top: 1px solid var(--border);
  }

  .input-wrap {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 12px;
    transition: border-color 0.2s;
  }

  .input-wrap:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  textarea {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13.5px;
    line-height: 1.5;
    resize: none;
    max-height: 120px;
    min-height: 22px;
    overflow-y: auto;
  }

  textarea::placeholder { color: var(--text-dim); }

  textarea::-webkit-scrollbar { width: 3px; }
  textarea::-webkit-scrollbar-thumb { background: var(--border); }

  .send-btn {
    width: 32px; height: 32px;
    flex-shrink: 0;
    border-radius: 8px;
    background: var(--accent);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    margin-bottom: 1px;
  }

  .send-btn:hover { background: #2563eb; transform: scale(1.05); }
  .send-btn:active { transform: scale(0.97); }
  .send-btn:disabled { background: var(--border); cursor: not-allowed; transform: none; opacity: 0.5; }
  .send-btn svg { width: 15px; height: 15px; fill: white; }

  .input-footer {
    text-align: center;
    margin-top: 8px;
    font-size: 10.5px;
    color: var(--text-dim);
    letter-spacing: 0.01em;
  }

  /* Error */
  .error-msg {
    color: #f87171;
    font-size: 12.5px;
    padding: 8px 12px;
    background: rgba(248,113,113,0.08);
    border: 1px solid rgba(248,113,113,0.2);
    border-radius: var(--radius-sm);
    margin-top: 6px;
  }

  /* Searching badge */
  .searching-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--accent);
    font-family: 'DM Mono', monospace;
    padding: 4px 10px;
    background: var(--accent-glow);
    border: 1px solid rgba(59,130,246,0.2);
    border-radius: 20px;
    margin-bottom: 8px;
    animation: pulse 1.5s infinite;
  }
</style>
</head>
<body>
<div class="app">
  <header class="header">
    <div class="header-icon">
      <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
    </div>
    <div class="header-info">
      <div class="header-title">SharePoint AI Assistant</div>
      <div class="header-sub">Connected to your organisation's SharePoint</div>
    </div>
    <div class="status-dot" id="statusDot"></div>
  </header>

  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">
        <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      </div>
      <h2>How can I help you?</h2>
      <p>Ask me anything about your SharePoint — documents, folders, policies, reports, and more.</p>
      <div class="suggestions">
        <button class="suggestion-btn" onclick="sendSuggestion(this)">📁 What folders exist in SharePoint?</button>
        <button class="suggestion-btn" onclick="sendSuggestion(this)">📄 Find the latest financial report</button>
        <button class="suggestion-btn" onclick="sendSuggestion(this)">🔍 Search for HR policy documents</button>
        <button class="suggestion-btn" onclick="sendSuggestion(this)">📋 List recently modified files</button>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-wrap">
      <textarea id="userInput" placeholder="Ask about your SharePoint..." rows="1"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Send">
        <svg viewBox="0 0 24 24"><path d="M22 2L11 13M22 2L15 22 11 13 2 9l20-7z"/></svg>
      </button>
    </div>
    <div class="input-footer">Powered by Claude · Searches your SharePoint in real time</div>
  </div>
</div>

<script>
// ─── CONFIG ──────────────────────────────────────────────────────────────────
const SYSTEM_PROMPT = `You are a helpful SharePoint AI Assistant. Your job is to help users find and understand information stored in their organisation's SharePoint environment.

When a user asks a question:
1. Use the Microsoft 365 SharePoint search tools available to you to search for relevant documents, files, and folders.
2. Summarise what you find clearly and concisely.
3. When referencing specific files or documents, mention their names so users know what you found.
4. If you find multiple relevant items, list the most useful ones.
5. If nothing is found, say so honestly and suggest alternative search terms.

Always be helpful, clear, and professional. Format your responses with clear structure when listing multiple items. Do not make up information — only share what you actually find via search.`;

// ─── STATE ────────────────────────────────────────────────────────────────────
let conversationHistory = [];
let isLoading = false;

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function scrollToBottom() {
  const msgs = document.getElementById('messages');
  msgs.scrollTop = msgs.scrollHeight;
}

function sendSuggestion(btn) {
  const text = btn.textContent.replace(/^[^\w]+/, '').trim();
  document.getElementById('userInput').value = text;
  sendMessage();
}

function hideWelcome() {
  const w = document.getElementById('welcome');
  if (w) w.remove();
}

// ─── RENDER HELPERS ──────────────────────────────────────────────────────────
function createAvatar(type) {
  const el = document.createElement('div');
  el.className = `avatar ${type}`;
  el.textContent = type === 'bot' ? 'AI' : 'You';
  return el;
}

function appendUserMessage(text) {
  hideWelcome();
  const row = document.createElement('div');
  row.className = 'msg-row user';
  const avatar = createAvatar('user');
  const bubble = document.createElement('div');
  bubble.className = 'bubble user';
  bubble.textContent = text;
  row.appendChild(avatar);
  row.appendChild(bubble);
  document.getElementById('messages').appendChild(row);
  scrollToBottom();
}

function appendThinking() {
  const row = document.createElement('div');
  row.className = 'msg-row bot';
  row.id = 'thinkingRow';
  const avatar = createAvatar('bot');
  const thinking = document.createElement('div');
  thinking.className = 'thinking';
  for (let i = 0; i < 3; i++) {
    const dot = document.createElement('div');
    dot.className = 'dot';
    thinking.appendChild(dot);
  }
  row.appendChild(avatar);
  row.appendChild(thinking);
  document.getElementById('messages').appendChild(row);
  scrollToBottom();
  return row;
}

function removeThinking() {
  const el = document.getElementById('thinkingRow');
  if (el) el.remove();
}

function appendBotMessage(text, sources = []) {
  removeThinking();
  const row = document.createElement('div');
  row.className = 'msg-row bot';
  const avatar = createAvatar('bot');
  const bubble = document.createElement('div');
  bubble.className = 'bubble bot';
  bubble.textContent = text;

  if (sources.length > 0) {
    const sourceDiv = document.createElement('div');
    sourceDiv.className = 'sources';
    sources.slice(0, 5).forEach(src => {
      const chip = document.createElement('div');
      chip.className = 'source-chip';
      chip.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6"/></svg> ${src}`;
      sourceDiv.appendChild(chip);
    });
    bubble.appendChild(sourceDiv);
  }

  row.appendChild(avatar);
  row.appendChild(bubble);
  document.getElementById('messages').appendChild(row);
  scrollToBottom();
}

function appendError(msg) {
  removeThinking();
  const err = document.createElement('div');
  err.className = 'error-msg';
  err.textContent = '⚠ ' + msg;
  document.getElementById('messages').appendChild(err);
  scrollToBottom();
}

// ─── EXTRACT SOURCES FROM RESPONSE ───────────────────────────────────────────
function extractSources(content) {
  const sources = new Set();
  content.forEach(block => {
    if (block.type === 'mcp_tool_result') {
      try {
        const raw = block.content?.[0]?.text || '';
        // Try to find file/document names using common patterns
        const nameMatches = raw.match(/"(?:name|title|fileName|displayName)"\s*:\s*"([^"]+)"/g) || [];
        nameMatches.forEach(m => {
          const val = m.match(/"([^"]+)"$/)?.[1];
          if (val && val.length < 80) sources.add(val);
        });
      } catch (_) {}
    }
  });
  return [...sources].slice(0, 5);
}

// ─── MAIN SEND ────────────────────────────────────────────────────────────────
async function sendMessage() {
  const input = document.getElementById('userInput');
  const sendBtn = document.getElementById('sendBtn');
  const text = input.value.trim();
  if (!text || isLoading) return;

  isLoading = true;
  input.value = '';
  input.style.height = 'auto';
  sendBtn.disabled = true;

  appendUserMessage(text);
  conversationHistory.push({ role: 'user', content: text });
  appendThinking();

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: conversationHistory,
        mcp_servers: [
          {
            type: 'url',
            url: 'https://microsoft365.mcp.claude.com/mcp',
            name: 'microsoft365'
          }
        ]
      })
    });

    if (!response.ok) {
      const err = await response.json().catch(() => ({}));
      throw new Error(err.error?.message || `API error ${response.status}`);
    }

    const data = await response.json();
    const sources = extractSources(data.content || []);

    const assistantText = (data.content || [])
      .filter(b => b.type === 'text')
      .map(b => b.text)
      .join('\n')
      .trim();

    if (assistantText) {
      appendBotMessage(assistantText, sources);
      conversationHistory.push({ role: 'assistant', content: assistantText });
    } else {
      appendBotMessage("I searched your SharePoint but couldn't find a clear answer. Try rephrasing your question.");
    }

  } catch (err) {
    console.error(err);
    appendError(err.message || 'Something went wrong. Please try again.');
  } finally {
    isLoading = false;
    sendBtn.disabled = false;
    input.focus();
  }
}
</script>
</body>
</html>
